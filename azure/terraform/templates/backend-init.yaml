#cloud-config
package_update: true
package_upgrade: false
packages:
  - nginx
runcmd:
  - systemctl enable nginx
  - systemctl start nginx
  - |
    HOST=$(hostname)
    PRIVATE_IP=$(hostname -I | awk '{print $1}')
    cat > /var/www/html/index.html << HTMLEOF
    <!DOCTYPE html>
    <html lang="en">
    <head>
      <meta charset="UTF-8" />
      <title>Tailscale Private Backend</title>
      <style>
        body { font-family: monospace; background: #0d1117; color: #c9d1d9; padding: 2rem; }
        h1   { color: #58a6ff; }
        .ok  { color: #3fb950; font-weight: bold; }
      </style>
    </head>
    <body>
      <h1>Tailscale Private Backend</h1>
      <p><span class="ok">Subnet routing is working!</span></p>
      <p>Host: <strong>$HOST</strong></p>
      <p>Private IP: <strong>$PRIVATE_IP</strong></p>
      <p>10.0.2.0/24 is being advertised to the Tailnet by the subnet router.</p>
      <small>This VM has no public IP. You reached it through Tailscale.</small>
    </body>
    </html>
    HTMLEOF
